# VECTOR 2: Branch Name Injection via pull_request_target
# Deploy to: fitzpr/poc-prt-vuln/.github/workflows/branch-name-injection.yml
#
# github.head_ref is the fork's branch name — fully attacker-controlled.
# Characters like backticks and $() survive in git branch names pushed via CLI.

name: Branch Name Check

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch
        run: |
          echo "Source branch: ${{ github.head_ref }}"
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
